{{- if and .Values.enterprise.enabled .Values.enterprise.o2ai.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openobserve.fullname" . }}-o2ai-cliconfig
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "openobserve.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.enterprise.o2ai.cliConfig }}
    {{- toYaml .Values.enterprise.o2ai.cliConfig | nindent 4 }}
    {{- else }}
    clis:
      kubectl:
        command: kubectl
        allowed_subcommands: ["get", "describe", "logs"]
        timeout_seconds: 30
        description: "Run kubectl commands for Kubernetes cluster management"
    {{- end }}
{{- end }}
