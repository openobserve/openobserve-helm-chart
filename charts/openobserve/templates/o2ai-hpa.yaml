{{- if and .Values.enterprise.enabled .Values.enterprise.o2ai.enabled .Values.autoscaling.o2ai.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "openobserve.fullname" . }}-o2ai
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "openobserve.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "openobserve.fullname" . }}-o2ai
  minReplicas: {{ .Values.autoscaling.o2ai.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.o2ai.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.o2ai.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.o2ai.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.o2ai.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.o2ai.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
