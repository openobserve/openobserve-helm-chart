{{- if and .Values.enterprise.enabled .Values.enterprise.o2ai.enabled .Values.enterprise.o2ai.clusterAccess.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openobserve.fullname" . }}-o2ai
  labels:
    {{- include "openobserve.labels" . | nindent 4 }}
rules:
  {{- if .Values.enterprise.o2ai.clusterAccess.rbac.rules }}
  {{- toYaml .Values.enterprise.o2ai.clusterAccess.rbac.rules | nindent 2 }}
  {{- else }}
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "namespaces", "nodes", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
{{- end }}
