# Default values for openobserve-collector.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

exporters:
  otlphttp/openobserve:
    endpoint: https://api.openobserve.ai/api/default/
    headers:
      Authorization: Basic YOUR_BASE64_ENCODED_AUTH
  otlphttp/openobserve_k8s_events:
    endpoint: https://api.openobserve.ai/api/default/
    headers:
      Authorization: Basic CHANGEME_BASE64_ENCODED_AUTH
      stream-name: k8s_events

k8sCluster: "cluster1"

image:
  repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.138.0"

nameOverride: ""
fullnameOverride: ""
clusterDomain: "cluster.local"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# kube-state-metrics exposes Kubernetes object states as Prometheus metrics.
# Set enabled: false if you already have kube-state-metrics installed in your cluster.
kube-state-metrics:
  enabled: true
  namespaceOverride: "kube-system"
  fullnameOverride: "kube-state-metrics"
  tolerations:
    - operator: Exists
  extraArgs:
    - --metric-annotations-allowlist=replicasets=[deployment.kubernetes.io/revision]
    - --metric-opt-in-list=kube_serviceaccount_info,kube_serviceaccount_created,kube_serviceaccount_secret,kube_serviceaccount_image_pull_secret
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# If Opentelemetry operator should be installed with the chart. If you already have the operator installed, set enabled to false. Refer https://opentelemetry.io/docs/kubernetes/operator/ and https://opentelemetry.io/docs/kubernetes/helm/operator/
opentelemetry-operator:
  enabled: false
  admissionWebhooks:
    certManager:
      enabled: false
      autoGenerateCert: true
  manager:
    # auto-instrumentation can be enabled for go which is disabled by default. go auto-instrumentation uses eBPF and requires privileged mode.
    featureGates: "--operator.autoinstrumentation.go=true"

## Auto-Instrumentation resource to be installed in the cluster
## Can be used by setting the following to the pod/namespace annotations:
##  Java: instrumentation.opentelemetry.io/inject-java: "true"
##  NodeJS: instrumentation.opentelemetry.io/inject-nodejs: "true"
##  Python: instrumentation.opentelemetry.io/inject-python: "true"
##  DotNet: instrumentation.opentelemetry.io/inject-dotnet: "true"
##  Go: instrumentation.opentelemetry.io/inject-go: "true" , instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/path/to/container/executable"
##  OpenTelemetry SDK environment variables only: instrumentation.opentelemetry.io/inject-sdk: "true"
autoinstrumentation:
  enabled: true
  # Sampling rate for traces (0.0 to 1.0). 0.1 = 10%, 1.0 = 100%
  samplingRate: "1.0"
  # Go instrumentation image version
  goImageVersion: "v0.23.0"
  # Enable Python logs auto-instrumentation
  pythonLogsEnabled: false

agent:
  enabled: true
  tolerations:
    - operator: Exists
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  receivers:
    filelog/std:
      include: [/var/log/pods/*/*/*.log]
      exclude:
        # Exclude logs from all containers named otel-collector or otc-container (otel-contrib)
        - /var/log/pods/*/otel-collector/*.log # named otel-collector
        - /var/log/pods/*/otc-container/*.log # named otc-container (for otel-contrib containers)
        - /var/log/pods/*/openobserve-ingester/*.log # avoid cyclical logs as ingester logs can be massive
      start_at: beginning
      include_file_path: true
      include_file_name: false
      operators:
        # Find out which format is used by kubernetes
        - type: router
          id: get-format
          routes:
            - output: parser-docker
              expr: 'body matches "^\\{"'
            - output: parser-crio
              expr: 'body matches "^[^ Z]+ "'
            - output: parser-containerd
              expr: 'body matches "^[^ Z]+Z"'
        # Parse CRI-O format
        - type: regex_parser
          id: parser-crio
          regex: "^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
          output: extract_metadata_from_filepath
          timestamp:
            parse_from: attributes.time
            layout_type: gotime
            layout: "2006-01-02T15:04:05.999999999Z07:00"
        # Parse CRI-Containerd format
        - type: regex_parser
          id: parser-containerd
          regex: "^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
          output: extract_metadata_from_filepath
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"
        # Parse Docker format
        - type: json_parser
          id: parser-docker
          output: extract_metadata_from_filepath
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"
        # Extract pod UID from file path for k8sattributes processor association
        - type: regex_parser
          id: extract_metadata_from_filepath
          regex: '^.*\/[^_]+_[^_]+_(?P<uid>[a-f0-9\-]{36})\/'
          parse_from: attributes["log.file.path"]
          cache:
            size: 128
        # Update body field after finishing all parsing
        - type: move
          from: attributes.log
          to: body
        # Rename stream attribute
        - type: move
          from: attributes.stream
          to: attributes["log.iostream"]
        # Move pod UID to resource for k8sattributes processor association
        # on_error: send ensures static pods (etcd, kube-apiserver) with non-standard UIDs
        # are still processed even when the regex above didn't capture a uid
        - type: move
          from: attributes.uid
          to: resource["k8s.pod.uid"]
          on_error: send
    hostmetrics:
      root_path: /hostfs
      collection_interval: 10s
      scrapers:
        cpu:
          metrics:
            system.cpu.utilization:
              enabled: true
        disk: {}
        filesystem:
          exclude_mount_points:
            match_type: regexp
            mount_points:
              - /dev/.*
              - /proc/.*
              - /sys/.*
              - /run/k3s/containerd/.*
              - /var/lib/docker/.*
              - /var/lib/kubelet/.*
              - /snap/.*
          exclude_fs_types:
            match_type: strict
            fs_types:
              - autofs
              - binfmt_misc
              - bpf
              - cgroup2
              - configfs
              - debugfs
              - devpts
              - devtmpfs
              - fusectl
              - hugetlbfs
              - iso9660
              - mqueue
              - nsfs
              - overlay
              - proc
              - procfs
              - pstore
              - rpc_pipefs
              - securityfs
              - selinuxfs
              - squashfs
              - sysfs
              - tracefs
        load: {}
        memory:
          metrics:
            system.memory.utilization:
              enabled: true
        network: {}
        #     paging: {}
        processes: {}
        #     process: {} # a bug in the process scraper causes the collector to throw errors so disabling it for now
    kubeletstats:
      collection_interval: 10s
      auth_type: "serviceAccount"
      endpoint: "https://${env:K8S_NODE_IP}:10250"
      insecure_skip_verify: true
      extra_metadata_labels:
        - container.id
        - k8s.volume.type
      metric_groups:
        - node
        - pod
        - container
        - volume
      metrics:
        # CPU usage metrics (default since v0.125.0+, represents raw CPU usage in cores)
        k8s.pod.cpu.usage:
          enabled: true
        k8s.node.cpu.usage:
          enabled: true
        k8s.node.cpu.time:
          enabled: true
        container.cpu.usage:
          enabled: true
        # Utilization metrics (percentage-based, calculated against limits/requests)
        k8s.pod.cpu_limit_utilization:
          enabled: true
        k8s.pod.cpu_request_utilization:
          enabled: true
        k8s.pod.memory_limit_utilization:
          enabled: true
        k8s.pod.memory_request_utilization:
          enabled: true
  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
      spike_limit_mib: 128
    resourcedetection:
      detectors: [system, env, k8snode]
      override: true
      system:
        hostname_sources: [os, dns]
    k8sattributes:
      auth_type: "serviceAccount"
      passthrough: false
      filter:
        node_from_env_var: K8S_NODE_NAME
      extract:
        labels:
          - tag_name: service.name
            key: app.kubernetes.io/name
            from: pod
          - tag_name: k8s.app.name
            key: k8s-app
            from: pod
          - tag_name: k8s.app.instance
            key: app.kubernetes.io/instance
            from: pod
          - tag_name: service.version
            key: app.kubernetes.io/version
            from: pod
          - tag_name: k8s.app.component
            key: app.kubernetes.io/component
            from: pod
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.container.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
            - from: resource_attribute
              name: k8s.node.name
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
        - sources:
            - from: connection
    batch:
      send_batch_size: 2000
      send_batch_max_size: 5000
      timeout: 5s
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    zpages: {}
    # memory_ballast:
    #   # Memory Ballast size should be max 1/3 to 1/2 of memory. It's a large buffer that is pre-allocated in the memory to help stabilize and reduce the garbage collection (GC) pressure on the Go runtime.
    #   size_mib: 512
  connectors: {}
  service:
    extensions: [health_check, zpages]
    pipelines:
      logs:
        receivers: [filelog/std]
        processors:
          [memory_limiter, resourcedetection, attributes, k8sattributes, batch]
        exporters: [otlphttp/openobserve] 
      metrics:
        receivers: [kubeletstats, hostmetrics]
        processors:
          [memory_limiter, resourcedetection, attributes, k8sattributes, batch]
        exporters: [otlphttp/openobserve] 

gateway:
  enabled: true
  # Number of replicas when autoscaler is not used
  replicas: 1
  targetAllocator:
    enabled: false
    resources: {}
      # We usually recommend not to specify default resources and to leave this as a conscious
      # choice for the user. This also increases chances charts run on environments with little
      # resources, such as Minikube. If you do want to specify resources, uncomment the following
      # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      # requests:
      #   cpu: 50m
      #   memory: 64Mi
  affinity: {}
  nodeSelector: {}
  tolerations:
    - operator: Exists
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  # Autoscaler configuration for the OpenTelemetry Operator
  # When enabled (by setting any field), the operator will create a HorizontalPodAutoscaler
  # Note: Autoscaling requires resources.requests to be set for CPU/memory metrics to work
  autoscaler: {}
    # minReplicas: 1
    # maxReplicas: 10
    # targetCPUUtilization: 80
    # targetMemoryUtilization: 80
    # # Advanced: Custom HPA behavior (optional)
    # behavior:
    #   scaleDown:
    #     stabilizationWindowSeconds: 300
    #     policies:
    #     - type: Percent
    #       value: 50
    #       periodSeconds: 15
    #   scaleUp:
    #     stabilizationWindowSeconds: 0
    #     policies:
    #     - type: Percent
    #       value: 100
    #       periodSeconds: 15
    # # Advanced: Custom metrics (optional)
    # metrics: []
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}
    k8sobjects/events:
      auth_type: serviceAccount
      objects:
        - name: events
          mode: watch
          group: events.k8s.io
          # namespaces: []
    k8sobjects/pods:
      auth_type: serviceAccount
      objects:
        - name: pods
          mode: watch
          # label_selector: environment in (production),tier in (frontend)
          # field_selector filters removed to capture all pod phases (Pending, Running, Failed, etc.)
    k8sobjects/nodes:
      auth_type: serviceAccount
      objects:
        - name: nodes
          mode: watch
    k8sobjects/deployments:
      auth_type: serviceAccount
      objects:
        - name: deployments
          mode: watch
          group: apps
    k8sobjects/services:
      auth_type: serviceAccount
      objects:
        - name: services
          mode: watch
    k8sobjects/namespaces:
      auth_type: serviceAccount
      objects:
        - name: namespaces
          mode: watch
    k8sobjects/pvcs:
      auth_type: serviceAccount
      objects:
        - name: persistentvolumeclaims
          mode: watch
    k8sobjects/daemonsets:
      auth_type: serviceAccount
      objects:
        - name: daemonsets
          mode: watch
          group: apps
    k8sobjects/statefulsets:
      auth_type: serviceAccount
      objects:
        - name: statefulsets
          mode: watch
          group: apps
    k8sobjects/ingresses:
      auth_type: serviceAccount
      objects:
        - name: ingresses
          mode: watch
          group: networking.k8s.io
    k8sobjects/jobs:
      auth_type: serviceAccount
      objects:
        - name: jobs
          mode: watch
          group: batch
    k8sobjects/cronjobs:
      auth_type: serviceAccount
      objects:
        - name: cronjobs
          mode: watch
          group: batch
    k8sobjects/persistentvolumes:
      auth_type: serviceAccount
      objects:
        - name: persistentvolumes
          mode: watch
    k8sobjects/serviceaccounts:
      auth_type: serviceAccount
      objects:
        - name: serviceaccounts
          mode: watch
    k8sobjects/roles:
      auth_type: serviceAccount
      objects:
        - name: roles
          mode: watch
          group: rbac.authorization.k8s.io
    k8sobjects/clusterroles:
      auth_type: serviceAccount
      objects:
        - name: clusterroles
          mode: watch
          group: rbac.authorization.k8s.io
    k8sobjects/rolebindings:
      auth_type: serviceAccount
      objects:
        - name: rolebindings
          mode: watch
          group: rbac.authorization.k8s.io
    k8sobjects/clusterrolebindings:
      auth_type: serviceAccount
      objects:
        - name: clusterrolebindings
          mode: watch
          group: rbac.authorization.k8s.io
    k8sobjects/hpa:
      auth_type: serviceAccount
      objects:
        - name: horizontalpodautoscalers
          mode: watch
          group: autoscaling
    k8sobjects/crds:
      auth_type: serviceAccount
      objects:
        - name: customresourcedefinitions
          mode: pull
          interval: 5m
          group: apiextensions.k8s.io
    k8sobjects/storageclasses:
      auth_type: serviceAccount
      objects:
        - name: storageclasses
          mode: watch
          group: storage.k8s.io
    k8sobjects/configmaps:
      auth_type: serviceAccount
      objects:
        - name: configmaps
          mode: watch
    k8sobjects/networkpolicies:
      auth_type: serviceAccount
      objects:
        - name: networkpolicies
          mode: watch
          group: networking.k8s.io
    k8sobjects/endpoints:
      auth_type: serviceAccount
      objects:
        - name: endpoints
          mode: watch
    k8sobjects/replicasets:
      auth_type: serviceAccount
      objects:
        - name: replicasets
          mode: watch
          group: apps
    k8sobjects/limitranges:
      auth_type: serviceAccount
      objects:
        - name: limitranges
          mode: watch
    k8sobjects/resourcequotas:
      auth_type: serviceAccount
      objects:
        - name: resourcequotas
          mode: watch
    prometheus:
      config:
        scrape_configs:
          - job_name: cadvisor
            scheme: https
            sample_limit: 10000
            scrape_interval: 10s
            scrape_timeout: 10s
            metrics_path: /metrics/cadvisor
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecure_skip_verify: true
            authorization:
              credentials_file: "/var/run/secrets/kubernetes.io/serviceaccount/token"
              type: Bearer
            kubernetes_sd_configs:
              - role: node
            metric_relabel_configs:
              # Keep container filesystem read/write metrics for IOPS
              - action: keep
                regex: container_fs_(reads_total|writes_total|reads_bytes_total|writes_bytes_total)
                source_labels:
                  - __name__
              # Drop cgroup metrics with no pod
              - action: drop
                regex: ".+;"
                separator: ";"
                source_labels:
                  - id
                  - pod
            relabel_configs:
              - action: replace
                replacement: "kubelet"
                target_label: job
              - action: replace
                source_labels:
                  - __meta_kubernetes_node_name
                target_label: node
          - job_name: kube-state-metrics
            scrape_interval: 30s
            scrape_timeout: 10s
            static_configs:
              - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]
            metric_relabel_configs:
              # Keep the most useful kube-state-metrics for a Datadog-equivalent view
              - action: keep
                regex: "kube_(pod_info|pod_created|pod_status_phase|pod_status_ready|pod_status_reason|pod_container_info|pod_container_status_ready|pod_container_status_restarts_total|pod_container_resource_requests|pod_container_resource_limits|pod_container_status_waiting.*|pod_container_status_terminated_reason|pod_owner|pod_spec_volumes_persistentvolumeclaims_info|deployment_status_replicas.*|deployment_spec_replicas|deployment_created|daemonset_created|daemonset_status.*|statefulset_replicas|statefulset_created|statefulset_status.*|replicaset_status.*|replicaset_spec_replicas|replicaset_created|replicaset_owner|replicaset_annotations|service_info|service_created|service_spec_type|service_status_load_balancer_ingress|endpoint_address|node_status_condition|node_status_allocatable|node_info|node_spec_taint|node_created|namespace_status_phase|namespace_created|persistentvolumeclaim_status_phase|persistentvolumeclaim_info|persistentvolumeclaim_access_mode|persistentvolumeclaim_resource_requests_storage_bytes|persistentvolumeclaim_created|persistentvolume_info|persistentvolume_created|persistentvolume_status_phase|persistentvolume_capacity_bytes|persistentvolume_access_mode|persistentvolume_reclaim_policy|horizontalpodautoscaler_info|horizontalpodautoscaler_created|horizontalpodautoscaler_status.*|horizontalpodautoscaler_spec.*|job_info|job_created|job_status.*|job_spec.*|job_complete|job_failed|job_owner|cronjob_info|cronjob_created|cronjob_status_active|cronjob_spec_suspend|cronjob_next_schedule_time|ingress_info|ingress_created|ingress_path|ingress_tls|ingress_labels|networkpolicy_created|networkpolicy_spec_ingress_rules|networkpolicy_spec_egress_rules|resourcequota|limitrange|serviceaccount_info|serviceaccount_created)"
                source_labels: [__name__]
          # CoreDNS metrics (DNS request rate, error rate, cache hit/miss)
          - job_name: coredns
            scrape_interval: 30s
            scrape_timeout: 10s
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names: [kube-system]
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name]
                action: keep
                regex: kube-dns
              - source_labels: [__meta_kubernetes_endpoint_port_name]
                action: keep
                regex: metrics
          # kube-apiserver metrics (request rate, latency, error rate, inflight requests)
          - job_name: kube-apiserver
            scheme: https
            scrape_interval: 30s
            scrape_timeout: 10s
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            authorization:
              credentials_file: "/var/run/secrets/kubernetes.io/serviceaccount/token"
              type: Bearer
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names: [default]
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                action: keep
                regex: kubernetes;https
            metric_relabel_configs:
              - action: keep
                regex: "apiserver_(request_total|request_duration_seconds_bucket|request_duration_seconds_count|admission_webhook_request_total|current_inflight_requests)|process_resident_memory_bytes|process_cpu_seconds_total|kubernetes_build_info"
                source_labels: [__name__]
          # kube-scheduler metrics (scheduling latency, queue depth)
          - job_name: kube-scheduler
            scheme: https
            scrape_interval: 30s
            scrape_timeout: 10s
            tls_config:
              insecure_skip_verify: true
            authorization:
              credentials_file: "/var/run/secrets/kubernetes.io/serviceaccount/token"
              type: Bearer
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [kube-system]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_component]
                action: keep
                regex: kube-scheduler
              - source_labels: [__address__]
                action: replace
                regex: "([^:]+)(?::\\d+)?"
                replacement: "$1:10259"
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_node_name]
                target_label: node
          # kube-controller-manager metrics (reconciliation errors, queue depth)
          - job_name: kube-controller-manager
            scheme: https
            scrape_interval: 30s
            scrape_timeout: 10s
            tls_config:
              insecure_skip_verify: true
            authorization:
              credentials_file: "/var/run/secrets/kubernetes.io/serviceaccount/token"
              type: Bearer
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [kube-system]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_component]
                action: keep
                regex: kube-controller-manager
              - source_labels: [__address__]
                action: replace
                regex: "([^:]+)(?::\\d+)?"
                replacement: "$1:10257"
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_node_name]
                target_label: node
          # Prometheus auto-discovery: scrapes any pod annotated with prometheus.io/scrape=true
          - job_name: prometheus-autodiscovery
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: "([^:]+)(?::\\d+)?;(\\d+)"
                replacement: "$1:$2"
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
                action: replace
                regex: (https?)
                target_label: __scheme__
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                target_label: service
            sample_limit: 10000

  processors:
    # Strip large CRD spec/status before export.
    # The openAPIV3Schema inside spec.versions[*].schema is 100KB-2MB per CRD.
    # We first promote the 3 useful spec fields (group, scope, versions names) into
    # the body directly, then delete spec/status entirely.
    transform/strip_crd_spec:
      log_statements:
        - context: log
          statements:
            - set(body["crd_group"], body["spec"]["group"]) where body["kind"] == "CustomResourceDefinition"
            - set(body["crd_scope"], body["spec"]["scope"]) where body["kind"] == "CustomResourceDefinition"
            - set(body["crd_stored_versions"], body["status"]["storedVersions"]) where body["kind"] == "CustomResourceDefinition"
            - delete_key(body, "spec") where body["kind"] == "CustomResourceDefinition"
            - delete_key(body, "status") where body["kind"] == "CustomResourceDefinition"
    memory_limiter:
      check_interval: 1s
      limit_mib: 1024
      spike_limit_mib: 256
    resourcedetection:
      detectors: [env]
      override: true
      timeout: 2s
    k8sattributes:
      auth_type: "serviceAccount"
      passthrough: false
      # filter:
      #   node_from_env_var: K8S_NODE_NAME
      extract:
        labels:
          - tag_name: service.name
            key: app.kubernetes.io/name
            from: pod
          - tag_name: k8s.app.name
            key: k8s-app
            from: pod
          - tag_name: k8s.app.instance
            key: app.kubernetes.io/instance
            from: pod
          - tag_name: service.version
            key: app.kubernetes.io/version
            from: pod
          - tag_name: k8s.app.component
            key: app.kubernetes.io/component
            from: pod
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.replicaset.uid
          - k8s.daemonset.name
          - k8s.daemonset.uid
          - k8s.job.name
          - k8s.job.uid
          - k8s.container.name
          - k8s.cronjob.name
          - k8s.statefulset.name
          - k8s.statefulset.uid
          - container.image.tag
          - container.image.name
          - k8s.cluster.uid
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
            - from: resource_attribute
              name: k8s.node.name
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
        - sources:
            - from: connection
    batch:
      send_batch_size: 2000
      send_batch_max_size: 5000
      timeout: 5s
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    zpages: {}
    # memory_ballast:
    #   # Memory Ballast size should be max 1/3 to 1/2 of memory. It's a large buffer that is pre-allocated in the memory to help stabilize and reduce the garbage collection (GC) pressure on the Go runtime.
    #   size_mib: 512
  connectors:
    servicegraph:
      latency_histogram_buckets:
        [
          2ms,
          4ms,
          6ms,
          8ms,
          10ms,
          50ms,
          100ms,
          200ms,
          400ms,
          800ms,
          1s,
          1400ms,
          2s,
          5s,
          10s,
          15s,
        ]
      dimensions:
        - http.method
      store:
        ttl: 30s
        max_items: 10000
  service:
    extensions: [health_check, zpages]
    pipelines:
      logs/k8s_events:
        receivers: [k8sobjects/events, k8sobjects/pods, k8sobjects/nodes, k8sobjects/deployments, k8sobjects/services, k8sobjects/namespaces, k8sobjects/pvcs, k8sobjects/daemonsets, k8sobjects/statefulsets, k8sobjects/ingresses, k8sobjects/jobs, k8sobjects/cronjobs, k8sobjects/persistentvolumes, k8sobjects/serviceaccounts, k8sobjects/roles, k8sobjects/clusterroles, k8sobjects/rolebindings, k8sobjects/clusterrolebindings, k8sobjects/hpa, k8sobjects/crds, k8sobjects/storageclasses, k8sobjects/configmaps, k8sobjects/networkpolicies, k8sobjects/endpoints, k8sobjects/replicasets, k8sobjects/limitranges, k8sobjects/resourcequotas]
        processors:
          [memory_limiter, resourcedetection, attributes, k8sattributes, transform/strip_crd_spec, batch]
        exporters: [otlphttp/openobserve_k8s_events]
      metrics:
        receivers: [otlp, servicegraph, prometheus]
        processors:
          [memory_limiter, resourcedetection, attributes, k8sattributes, batch]
        exporters: [otlphttp/openobserve] 
      traces:
        receivers: [otlp]
        processors:
          [memory_limiter, resourcedetection, attributes, k8sattributes, batch]
        exporters: [otlphttp/openobserve, servicegraph] 