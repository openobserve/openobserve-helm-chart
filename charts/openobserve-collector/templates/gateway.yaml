{{- if .Values.gateway.enabled -}}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
{{- $gatewayLabels := include "openobserve-collector.labels" . | fromYaml | default (dict) }}
{{- $gatewayLabels = mergeOverwrite $gatewayLabels (.Values.gateway.labels | default (dict)) }}
metadata:
  name: {{ include "openobserve-collector.fullname" . }}-gateway
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- toYaml $gatewayLabels | nindent 4 }}
spec:
  {{- if .Values.gateway.autoscaler }}
  autoscaler:
    {{- toYaml .Values.gateway.autoscaler | nindent 4 }}
  {{- else }}
  replicas: {{ .Values.gateway.replicas | default 1 }}
  {{- end }}
  mode: statefulset
  {{- if .Values.gateway.targetAllocator.enabled }}
  targetAllocator:
    enabled: true
    serviceAccount: {{ include "openobserve-collector.serviceAccountName" . }}
    {{- with .Values.gateway.targetAllocator.resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    prometheusCR:
      enabled: true
      serviceMonitorSelector: {}
      podMonitorSelector: {}
  {{- end }}
  serviceAccount: {{ include "openobserve-collector.serviceAccountName" . }}
  image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
