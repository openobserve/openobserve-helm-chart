name: GitHub Activity → OpenObserve

on:
  issues:
    types: [opened, edited, deleted, closed, reopened, assigned, unassigned, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request:
    types: [opened, edited, closed, reopened, assigned, unassigned, labeled, unlabeled, synchronize, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Send GitHub event to OpenObserve
        env:
          GITHUB_EVENT_JSON: ${{ toJson(github.event) }}
        run: |
          curl -X POST "${{ secrets.OO_CLOUD_INGEST_URL }}" \
            -H "Authorization: Basic ${{ secrets.OO_CLOUD_AUTH }}" \
            -H "Content-Type: application/json" \
            -d "$GITHUB_EVENT_JSON"
